<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      p.timestamp = message.timestamp;
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gsocial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000000;
  --card:#0a0a0a;
  --border:#1a0033;
  --text:#ffffff;
  --text2:#b3b3b3;
  --purple:#a855f7;
  --purple-dark:#9333ea;
  --input:#111111;
  --input-border:#333333;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  display:flex;justify-content:center;
  overscroll-behavior:none;
}
.app-container{
  width:100%;
  max-width:420px;
  min-height:100vh;
  background:var(--bg);
  position:relative;
  display:flex;
  flex-direction:column;
  border-left:1px solid #0a0a0a;
  border-right:1px solid #0a0a0a;
}

/* Barra superior */
.top-bar{
  height:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:sticky;
  top:0;
  z-index:50;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  box-shadow:0 2px 20px rgba(168,85,247,0.15);
}
.logo{
  font-size:24px;
  font-weight:700;
  letter-spacing:0.5px;
  color:var(--purple);
  text-shadow:0 0 8px rgba(168,85,247,0.8),0 0 20px rgba(168,85,247,0.5);
}

/* Telas */
main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.view{flex:1;overflow-y:auto;padding-bottom:80px;-webkit-overflow-scrolling:touch}
.view::-webkit-scrollbar{display:none}

/* Login */
#login-screen{
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.login-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:48px 28px;
  width:100%;
  max-width:340px;
  text-align:center;
  box-shadow:0 0 40px rgba(147,51,234,0.1), inset 0 1px 0 rgba(255,255,255,0.03);
}
.login-logo{
  font-size:44px;
  font-weight:800;
  color:var(--purple);
  text-shadow:0 0 12px rgba(168,85,247,0.8),0 0 30px rgba(168,85,247,0.6);
  margin-bottom:12px;
  letter-spacing:1px;
}
.login-subtitle{color:var(--text2);font-size:14px;margin-bottom:36px}
.btn{
  background:linear-gradient(135deg,var(--purple-dark),var(--purple));
  color:white;
  border:none;
  padding:14px 24px;
  border-radius:12px;
  font-weight:600;
  font-size:15px;
  cursor:pointer;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:all .2s;
  box-shadow:0 0 12px rgba(168,85,247,0.6);
  position:relative;
  overflow:hidden;
}
.btn:active{transform:scale(0.98)}
.btn:hover{box-shadow:0 0 20px rgba(168,85,247,0.8)}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.btn-secondary{
  background:var(--input);
  border:1px solid var(--input-border);
  box-shadow:none;
  margin-top:12px;
}
.btn-secondary:hover{border-color:var(--purple);box-shadow:0 0 8px rgba(168,85,247,0.3)}

/* Feed */
.feed{padding:12px}
.post{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  margin-bottom:14px;
  overflow:hidden;
  transition:all .2s;
}
.post:hover{border-color:#2a0055}
.post-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;
}
.avatar{
  width:32px;height:32px;border-radius:50%;
  object-fit:cover;background:#1a1a1a;
  border:1px solid var(--border);
}
.username{font-weight:600;font-size:14px}
.time{margin-left:auto;color:var(--text2);font-size:12px}
.post-text{padding:0 14px 12px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.post-image{
  width:100%;display:block;max-height:520px;object-fit:cover;background:#000;border-top:1px solid var(--border);border-bottom:1px solid var(--border)
}
.post-actions{padding:10px 14px;display:flex;align-items:center;gap:16px}
.like-btn{
  background:none;border:none;color:var(--text2);
  display:flex;align-items:center;gap:6px;
  cursor:pointer;font-size:14px;padding:6px 0;
  transition:color .2s;
}
.like-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;transition:all .2s}
.like-btn:hover{color:var(--text)}
.like-btn.liked{color:var(--purple)}
.like-btn.liked svg{fill:var(--purple);stroke:var(--purple);filter:drop-shadow(0 0 6px rgba(168,85,247,0.8));transform:scale(1.05)}

/* Criar post */
.create-view{padding:20px}
.form-group{margin-bottom:20px}
.label{display:block;margin-bottom:8px;color:var(--text2);font-size:13px;font-weight:500}
.textarea,.input{
  width:100%;background:var(--input);border:1px solid var(--input-border);
  border-radius:12px;padding:14px;color:var(--text);font-size:15px;
  font-family:inherit;resize:vertical;transition:all .2s;
}
.textarea{min-height:110px}
.textarea:focus,.input:focus{outline:none;border-color:var(--purple);box-shadow:0 0 8px rgba(168,85,247,0.6)}
.file-input{display:none}
.file-label{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  padding:36px 20px;background:var(--card);border:2px dashed #2a2a2a;border-radius:14px;
  cursor:pointer;transition:all .2s;color:var(--text2);text-align:center;
}
.file-label:hover{border-color:var(--purple);color:var(--purple);box-shadow:inset 0 0 20px rgba(168,85,247,0.08)}
.file-label svg{width:28px;height:28px;stroke:currentColor}
.preview-container{margin-top:14px;position:relative;display:none}
.preview-container.active{display:block}
.preview-img{width:100%;border-radius:12px;max-height:340px;object-fit:cover;border:1px solid var(--border)}
.preview-remove{
  position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;
  background:rgba(0,0,0,0.8);border:1px solid var(--purple);color:var(--purple);
  display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);
  font-size:18px;line-height:1;
}

/* Perfil */
.profile-view{padding:24px;text-align:center}
.profile-avatar{
  width:88px;height:88px;border-radius:50%;object-fit:cover;
  border:2px solid var(--purple);box-shadow:0 0 20px rgba(168,85,247,0.5);
  margin:0 auto 14px;
}
.profile-name{font-size:20px;font-weight:700;margin-bottom:4px}
.profile-email{color:var(--text2);font-size:13px;margin-bottom:24px}
.profile-stats{
  display:flex;justify-content:center;gap:32px;
  padding:18px;background:var(--card);border:1px solid var(--border);
  border-radius:14px;margin-bottom:20px;
}
.stat{text-align:center}
.stat-value{font-size:18px;font-weight:700;color:var(--purple);text-shadow:0 0 8px rgba(168,85,247,0.5)}
.stat-label{font-size:12px;color:var(--text2);margin-top:2px}

/* Bottom nav */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:420px;height:68px;
  background:rgba(0,0,0,0.92);backdrop-filter:blur(14px);
  border-top:1px solid var(--border);
  box-shadow:0 -2px 20px rgba(168,85,247,0.18);
  display:flex;justify-content:space-around;align-items:center;
  padding:0 16px 4px;z-index:40;
}
.nav-btn{
  background:none;border:none;color:#666;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;cursor:pointer;
  padding:8px 18px;border-radius:12px;transition:all .2s;position:relative;
  min-width:70px;
}
.nav-btn svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:2;transition:all .2s}
.nav-btn span{font-size:11px;font-weight:500}
.nav-btn.active{color:var(--purple)}
.nav-btn.active svg{stroke:var(--purple);filter:drop-shadow(0 0 6px rgba(168,85,247,0.8))}
.nav-btn.active::before{
  content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);
  width:28px;height:2px;background:var(--purple);box-shadow:0 0 8px rgba(168,85,247,0.8);border-radius:2px;
}

/* Estados vazios */
.empty-state{text-align:center;padding:80px 24px;color:var(--text2)}
.empty-state svg{width:48px;height:48px;stroke:#333;margin-bottom:16px}
.loader{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}

.hidden{display:none !important}
</style>
</head>

<script type="module">
// Importações Firebase via CDN
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, doc, updateDoc, increment, arrayUnion, arrayRemove, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

// Configuração Firebase
const firebaseConfig = {
  apiKey: "AIzaSyD7w1covFc9VSa1kmjyEw5iTuAxLu2Raf8",
  authDomain: "g-app-social.firebaseapp.com",
  projectId: "g-app-social",
  storageBucket: "g-app-social.firebasestorage.app",
  messagingSenderId: "526544172649",
  appId: "1:526544172649:web:5ac6f0ab0c9f84f98854f8"
};

// Inicialização
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
const provider = new GoogleAuthProvider();

// Elementos DOM
const loginScreen = document.getElementById('login-screen');
const appScreen = document.getElementById('app-screen');
const bottomNav = document.getElementById('bottom-nav');
const loginBtn = document.getElementById('login-btn');
const logoutBtn = document.getElementById('logout-btn');
const feedEl = document.getElementById('feed');
const profileFeedEl = document.getElementById('profile-feed');
const postBtn = document.getElementById('post-btn');
const postText = document.getElementById('post-text');
const postImage = document.getElementById('post-image');
const preview = document.getElementById('preview');
const previewImg = document.getElementById('preview-img');
const previewRemove = document.getElementById('preview-remove');

let currentUser = null;
let feedUnsubscribe = null;
let profileUnsubscribe = null;

// Utilitário tempo
function timeAgo(date){
  const s = Math.floor((Date.now() - date.getTime())/1000);
  if(s<60) return 'agora';
  const m = Math.floor(s/60); if(m<60) return `${m}m`;
  const h = Math.floor(m/60); if(h<24) return `${h}h`;
  const d = Math.floor(h/24); if(d<7) return `${d}d`;
  return date.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
}

// Login Google
loginBtn.onclick = async () => {
  try{
    loginBtn.disabled = true;
    await signInWithPopup(auth, provider);
  }catch(e){
    alert('Erro ao entrar: '+e.message);
    loginBtn.disabled = false;
  }
};

// Logout
logoutBtn.onclick = () => signOut(auth);

// Estado de autenticação
onAuthStateChanged(auth, user => {
  if(user){
    currentUser = user;
    loginScreen.classList.add('hidden');
    appScreen.classList.remove('hidden');
    bottomNav.classList.remove('hidden');
    document.getElementById('profile-avatar').src = user.photoURL || '';
    document.getElementById('profile-name').textContent = user.displayName || 'Usuário';
    document.getElementById('profile-email').textContent = user.email || '';
    startFeed();
    startProfile();
    showView('feed');
  }else{
    currentUser = null;
    loginScreen.classList.remove('hidden');
    appScreen.classList.add('hidden');
    bottomNav.classList.add('hidden');
    if(feedUnsubscribe) feedUnsubscribe();
    if(profileUnsubscribe) profileUnsubscribe();
  }
});

// Navegação
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.onclick = () => showView(btn.dataset.view);
});
function showView(view){
  document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));
  document.getElementById(view+'-view').classList.remove('hidden');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.view===view));
  window.scrollTo(0,0);
}

// Feed em tempo real
function startFeed(){
  if(feedUnsubscribe) feedUnsubscribe();
  const q = query(collection(db,'posts'), orderBy('createdAt','desc'));
  feedUnsubscribe = onSnapshot(q, snap=>{
    feedEl.innerHTML = '';
    if(snap.empty){
      feedEl.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5L5 21"/></svg><p>Nenhum post ainda<br>Seja o primeiro!</p></div>`;
      return;
    }
    snap.forEach(docSnap=> renderPost(docSnap, feedEl));
  });
}

// Renderizar post
function renderPost(docSnap, container){
  const data = docSnap.data();
  const id = docSnap.id;
  const liked = data.likedBy?.includes(currentUser.uid);
  const date = data.createdAt?.toDate ? data.createdAt.toDate() : new Date();
  
  const div = document.createElement('div');
  div.className = 'post';
  div.innerHTML = `
    <div class="post-header">
      <img class="avatar" src="${data.authorPhoto || 'https://via.placeholder.com/32/111111/a855f7?text=G'}" alt="">
      <span class="username">${data.authorName || 'Anônimo'}</span>
      <span class="time">${timeAgo(date)}</span>
    </div>
    ${data.text ? `<div class="post-text">${escapeHtml(data.text)}</div>` : ''}
    ${data.imageUrl ? `<img class="post-image" src="${data.imageUrl}" loading="lazy" alt="">` : ''}
    <div class="post-actions">
      <button class="like-btn ${liked?'liked':''}" data-id="${id}">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span>${data.likes || 0}</span>
      </button>
    </div>
  `;
  const likeBtn = div.querySelector('.like-btn');
  likeBtn.onclick = async () => {
    const refDoc = doc(db,'posts',id);
    try{
      if(liked){
        await updateDoc(refDoc, { likes: increment(-1), likedBy: arrayRemove(currentUser.uid) });
      }else{
        await updateDoc(refDoc, { likes: increment(1), likedBy: arrayUnion(currentUser.uid) });
      }
    }catch(e){ console.error(e); }
  };
  container.appendChild(div);
}

function escapeHtml(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Preview imagem
postImage.onchange = e => {
  const file = e.target.files[0];
  if(file){
    const url = URL.createObjectURL(file);
    previewImg.src = url;
    preview.classList.add('active');
  }
};
previewRemove.onclick = () => {
  postImage.value = '';
  preview.classList.remove('active');
  previewImg.src = '';
};

// Criar post
postBtn.onclick = async () => {
  const text = postText.value.trim();
  const file = postImage.files[0];
  
  if(!text && !file){ alert('Escreva algo ou adicione uma foto'); return; }
  
  postBtn.disabled = true;
  postBtn.textContent = 'Publicando...';
  
  try{
    let imageUrl = null;
    if(file){
      const storageRef = ref(storage, `posts/${currentUser.uid}/${Date.now()}_${file.name}`);
      const snap = await uploadBytes(storageRef, file);
      imageUrl = await getDownloadURL(snap.ref);
    }
    await addDoc(collection(db,'posts'), {
      text: text || '',
      imageUrl,
      uid: currentUser.uid,
      authorName: currentUser.displayName,
      authorPhoto: currentUser.photoURL,
      likes: 0,
      likedBy: [],
      createdAt: serverTimestamp()
    });
    // Limpar
    postText.value = '';
    postImage.value = '';
    preview.classList.remove('active');
    showView('feed');
  }catch(e){
    alert('Erro ao publicar: '+e.message);
  }finally{
    postBtn.disabled = false;
    postBtn.textContent = 'Publicar';
  }
};

// Perfil
function startProfile(){
  if(profileUnsubscribe) profileUnsubscribe();
  const q = query(collection(db,'posts'), where('uid','==',currentUser.uid), orderBy('createdAt','desc'));
  profileUnsubscribe = onSnapshot(q, snap=>{
    profileFeedEl.innerHTML = '';
    let totalLikes = 0;
    snap.forEach(docSnap=>{
      totalLikes += docSnap.data().likes || 0;
      renderPost(docSnap, profileFeedEl);
    });
    document.getElementById('profile-posts').textContent = snap.size;
    document.getElementById('profile-likes').textContent = totalLikes;
    if(snap.empty){
      profileFeedEl.innerHTML = `<div class="empty-state"><p>Você ainda não postou nada</p></div>`;
    }
  });
}
</script>
