<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Gsocial</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<link rel="manifest" id="manifest">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #fafafa;
    --card: #ffffff;
    --text: #262626;
    --text2: #8e8e8e;
    --border: #dbdbdb;
    --accent: #0095f6;
    --red: #ed4956;
    --story: conic-gradient(#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --bg2: #000000;
      --card: #000000;
      --text: #f5f5f5;
      --text2: #a8a8a8;
      --border: #262626;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #111;
    color: var(--text);
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 420px;
    height: 100dvh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,.2);
  }
  header {
    position: sticky;
    top: 0;
    z-index: 40;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
    background: color-mix(in srgb, var(--bg) 85%, transparent);
    backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(45deg, #f9a825, #f03861, #b12db3);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .top-icons { display: flex; gap: 18px; }
  .icon-btn { background: none; border: 0; padding: 0; width: 26px; height: 26px; color: var(--text); cursor: pointer; }

  main { flex: 1; overflow-y: auto; overflow-x: hidden; background: var(--bg2); scrollbar-width: none; }
  main::-webkit-scrollbar { display: none; }

  .view { display: block; }
  .view[hidden] { display: none !important; }

  /* Stories */
  .stories {
    display: flex;
    gap: 14px;
    padding: 12px 16px;
    overflow-x: auto;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .stories::-webkit-scrollbar { display: none; }
  .story { text-align: center; width: 66px; flex-shrink: 0; cursor: pointer; }
  .story-ring {
    width: 66px; height: 66px; border-radius: 50%; padding: 2.5px;
    background: var(--story);
  }
  .story-ring.seen { background: var(--border); }
  .story-ring.you { background: #ddd; }
  @media (prefers-color-scheme: dark) { .story-ring.you { background: #333; } }
  .story img {
    width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--bg); object-fit: cover; background: #eee;
  }
  .story span { font-size: 12px; color: var(--text2); display: block; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Feed */
  .feed { padding-bottom: 90px; }
  .post {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .post-head { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
  .post-head img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
  .post-user { flex: 1; line-height: 1.15; }
  .post-user strong { font-size: 14px; font-weight: 600; display: block; }
  .post-user small { font-size: 12px; color: var(--text2); }

  .post-img-wrap { position: relative; background: #000; overflow: hidden; }
  .post-img { width: 100%; aspect-ratio: 4/5; object-fit: cover; display: block; background: #222; }
  .heart-burst { position: absolute; inset: 0; display: grid; place-items: center; pointer-events: none; opacity: 0; }
  .heart-burst.show { animation: heartPop .9s ease; }
  @keyframes heartPop { 0%{opacity:0; transform:scale(0)} 15%{opacity:1; transform:scale(1.2)} 30%{transform:scale(1)} 80%{opacity:1} 100%{opacity:0; transform:scale(1)} }

  .post-actions { display: flex; align-items: center; gap: 16px; padding: 10px 12px; }
  .post-actions button { background: none; border: 0; padding: 0; width: 26px; height: 26px; color: var(--text); cursor: pointer; }
  .post-actions button.save { margin-left: auto; }
  .like-btn.liked svg { fill: var(--red); stroke: var(--red); animation: pop .25s ease; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }

  .post-info { padding: 0 12px 12px; font-size: 14px; }
  .likes { font-weight: 600; margin-bottom: 4px; }
  .caption strong { font-weight: 600; margin-right: 6px; }
  .time { color: var(--text2); font-size: 12px; margin-top: 6px; text-transform: uppercase; letter-spacing: .3px; }

  /* Bottom nav */
  nav.bottom {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 50;
    display: flex; justify-content: space-around; align-items: center;
    height: calc(50px + env(safe-area-inset-bottom));
    padding-bottom: env(safe-area-inset-bottom);
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: saturate(180%) blur(12px);
    border-top: 1px solid var(--border);
  }
  .nav-btn { flex: 1; height: 50px; display: grid; place-items: center; background: none; border: 0; color: var(--text2); cursor: pointer; }
  .nav-btn.active { color: var(--text); }
  .nav-btn svg { width: 26px; height: 26px; }
  .nav-btn.create svg { width: 28px; height: 28px; }

  /* Search */
  .search-bar { padding: 10px 12px; background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5; }
  .search-bar input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 15px; color: var(--text); outline: none; }
  .grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 2px; padding-bottom: 90px; background: var(--bg); }
  .grid img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #ddd; cursor: pointer; }

  /* Reels */
  .reels { height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; background: #000; }
  .reel { position: relative; height: calc(100dvh - 50px); scroll-snap-align: start; }
  .reel img, .reel video { width: 100%; height: 100%; object-fit: cover; }
  .reel-ui { position: absolute; right: 10px; bottom: 90px; display: flex; flex-direction: column; gap: 20px; align-items: center; color: white; }
  .reel-ui button { background: none; border: 0; color: white; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 12px; }
  .reel-ui svg { width: 30px; height: 30px; filter: drop-shadow(0 1px 2px rgba(0,0,0,.6)); }
  .reel-info { position: absolute; left: 12px; bottom: 90px; right: 70px; color: white; text-shadow: 0 1px 2px rgba(0,0,0,.7); font-size: 14px; }

  /* Profile */
  .profile-head { background: var(--bg); padding: 16px; border-bottom: 1px solid var(--border); }
  .profile-top { display: flex; gap: 20px; align-items: center; }
  .profile-top img { width: 86px; height: 86px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
  .stats { display: flex; flex: 1; justify-content: space-around; text-align: center; }
  .stats strong { display: block; font-size: 18px; }
  .stats span { font-size: 13px; color: var(--text2); }
  .profile-name { margin-top: 12px; font-weight: 600; }
  .profile-bio { font-size: 14px; margin-top: 4px; white-space: pre-line; }
  .profile-actions { display: flex; gap: 8px; margin-top: 12px; }
  .btn { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 7px; font-weight: 600; font-size: 14px; color: var(--text); cursor: pointer; }

  /* Modal */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: none; place-items: center; z-index: 100; padding: 16px; }
  .modal.show { display: grid; }
  .modal-card { width: 100%; max-width: 380px; background: var(--card); border-radius: 16px; overflow: hidden; animation: up .25s ease; }
  @keyframes up { from{transform:translateY(20px); opacity:0} to{transform:none; opacity:1} }
  .modal-head { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-weight: 600; }
  .modal-body { padding: 14px; }
  .preview { width: 100%; aspect-ratio: 4/5; background: var(--bg2); border-radius: 12px; overflow: hidden; display: grid; place-items: center; border: 1px dashed var(--border); margin-bottom: 12px; }
  .preview img { width: 100%; height: 100%; object-fit: cover; display: none; }
  .preview span { color: var(--text2); font-size: 14px; }
  .modal textarea { width: 100%; min-height: 80px; resize: vertical; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px; color: var(--text); font-family: inherit; font-size: 14px; }
  .modal-foot { padding: 12px 14px; display: flex; gap: 8px; border-top: 1px solid var(--border); }
  .btn-primary { background: var(--accent); color: white; border: 0; border-radius: 10px; padding: 10px 14px; font-weight: 600; flex: 1; cursor: pointer; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-weight: 600; color: var(--text); cursor: pointer; }
  input[type=file] { display: none; }
</style>
</head>

function loadData() {
  try {
    posts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultPosts;
    likedMap = JSON.parse(localStorage.getItem(LIKES_KEY)) || {};
    // merge liked state
    posts = posts.map(p => ({...p, liked: !!likedMap[p.id]}));
    if (!localStorage.getItem(STORAGE_KEY)) savePosts();
  } catch(e) { posts = defaultPosts; }
}
function savePosts() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
}
function saveLikes() {
  localStorage.setItem(LIKES_KEY, JSON.stringify(likedMap));
}

function renderStories() {

}

function formatLikes(n) {
  return n.toLocaleString('pt-BR');
}

      toggleLike(p.id, true);
      const burst = article.querySelector('.heart-burst');
      burst.classList.remove('show'); void burst.offsetWidth; burst.classList.add('show');

    lastTap = now;
  });
  return article;

function renderFeed() {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  posts.sort((a,b) => b.timestamp - a.timestamp).forEach(p => {
    feed.appendChild(createPostElement(p));
  });
}

function toggleLike(id, fromDouble = false) {
  const post = posts.find(p => p.id === id);
  if (!post) return;
  post.liked = !post.liked || fromDouble === true;
  if (fromDouble && post.liked) { /* ensure liked */ }
  else if (!fromDouble) { /* toggled */ }
  // adjust count
  if (post.liked) {
    if (!likedMap[id]) post.likes++;
    likedMap[id] = true;
  } else {
    post.likes = Math.max(0, post.likes - 1);
    delete likedMap[id];
  }
  savePosts(); saveLikes();
  // update DOM
  const el = document.querySelector(`.post[data-id="${id}"]`);
  if (el) {
    el.querySelector('.like-btn').classList.toggle('liked', post.liked);
    el.querySelector('.like-btn svg').setAttribute('fill', post.liked ? 'currentColor' : 'none');
    el.querySelector('.likes').textContent = formatLikes(post.likes) + ' curtidas';
  }
}

function renderProfile() {

  document.getElementById('stat-posts').textContent = myPosts.length;

    grid.innerHTML = `<div style="grid-column:1/-1; padding:40px 20px; text-align:center; color:var(--text2)">Você ainda não publicou nada.<br>Clique no + para criar.</div>`;
  } else {
    grid.innerHTML = myPosts.map(p => `<img src="${p.image}" alt="" loading="lazy" onclick="openPost('${p.id}')">`).join('');

}

  document.querySelector('[data-view="home"]').click();
  setTimeout(() => {

  }, 100);
}

  }

// CREATE
const modal = document.getElementById('create-modal');
const fileInput = document.getElementById('fileInput');
const previewImg = document.getElementById('preview-img');
const previewText = document.getElementById('preview-text');
const publishBtn = document.getElementById('publish-btn');
let selectedDataUrl = null;

function openModal() {
  modal.classList.add('show');
  setTimeout(()=> fileInput.click(), 200);
}
function closeModal() {
  modal.classList.remove('show');
  selectedDataUrl = null;
  previewImg.style.display = 'none';
  previewImg.src = '';
  previewText.style.display = 'block';
  document.getElementById('caption').value = '';
  publishBtn.disabled = true;
}
function pickImage() { fileInput.click(); }
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    selectedDataUrl = ev.target.result;
    previewImg.src = selectedDataUrl;
    previewImg.style.display = 'block';
    previewText.style.display = 'none';
    publishBtn.disabled = false;
  };
  reader.readAsDataURL(file);
});
function publishPost() {
  if (!selectedDataUrl) return;
  const caption = document.getElementById('caption').value.trim();
  const newPost = {
    id: 'p' + Date.now(),
    username: 'voce',
    userAvatar: 'https://picsum.photos/seed/voce/100',
    location: 'São Paulo, Brasil',
    image: selectedDataUrl,
    caption: caption ? ' ' + caption : '',
    likes: 0,
    liked: false,
    timeAgo: 'agora',
    timestamp: Date.now()
  };
  posts.unshift(newPost);
  savePosts();
  renderFeed();
  closeModal();
  document.querySelector('[data-view="home"]').click();
  window.scrollTo({top:0, behavior:'smooth'});
}
