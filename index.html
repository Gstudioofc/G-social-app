<script>// Playables SDK v1.0.0

(function() {

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      p.timestamp = message.timestamp;
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gsocial</title>
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href='data:application/manifest+json,{"name":"Gsocial","short_name":"Gsocial","start_url":".","display":"standalone","background_color":"#ffffff","theme_color":"#ffffff","description":"Clone minimal do Instagram"}'>

<style>
  /* Reset básico */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #fafafa;
    color: #262626;
    -webkit-font-smoothing: antialiased;
  }

  /* Container principal - máximo 400px */
  .app {
    max-width: 400px;
    margin: 0 auto;
    background: #fff;
    min-height: 100vh;
    position: relative;
    border-left: 1px solid #efefef;
    border-right: 1px solid #efefef;
  }

  /* Barra superior */
  .topbar {
    height: 60px;
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #dbdbdb;
    position: sticky;
    top: 0;
    background: #fff;
    z-index: 10;
  }

  .logo {
    font-size: 24px;
    font-weight: 400;
    font-family: 'Billabong', cursive, -apple-system;
    letter-spacing: 0.5px;
  }

  .btn-auth {
    font-size: 13px;
    padding: 7px 14px;
    border: none;
    background: #0095f6;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
  }
  .btn-auth.out { background: transparent; color: #262626; border: 1px solid #dbdbdb; }

  /* Tela de login */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: calc(100vh - 60px);
    padding: 24px;
    text-align: center;
    gap: 24px;
  }

  .login-title {
    font-size: 48px;
    font-weight: 300;
    margin-bottom: 12px;
  }

  .login-subtitle {
    color: #8e8e8e;
    font-size: 15px;
    margin-bottom: 24px;
  }

  .btn-google {
    background: #0095f6;
    color: white;
    border: none;
    padding: 14px 32px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: opacity 0.2s;
  }
  .btn-google:active { opacity: 0.8; }

  /* Feed */
  #feed {
    padding-bottom: 70px;
    background: #fafafa;
  }

  /* Card de post - estilo Instagram */
  .post {
    background: white;
    border: 1px solid #dbdbdb;
    border-radius: 8px;
    margin: 0 0 12px 0;
    overflow: hidden;
  }

  .post-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
  }

  .post-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    background: #efefef;
  }

  .post-username {
    font-weight: 600;
    font-size: 14px;
  }

  .post-image {
    width: 100%;
    display: block;
    aspect-ratio: 1/1;
    object-fit: cover;
    background: #fafafa;
  }

  .post-actions {
    padding: 10px 12px;
    display: flex;
    align-items: center;
  }

  .like-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #262626;
  }
  .like-btn:active svg { transform: scale(0.9); }
  .like-btn svg { width: 24px; height: 24px; transition: transform 0.1s; }

  .like-count {
    font-size: 14px;
    font-weight: 600;
  }

  .post-caption {
    padding: 0 12px 12px;
    font-size: 14px;
    line-height: 1.4;
  }
  .post-caption strong { font-weight: 600; margin-right: 6px; }

  /* Barra inferior - apenas 2 ícones */
  .bottombar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 400px;
    height: 50px;
    background: white;
    border-top: 1px solid #dbdbdb;
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 10;
  }

  .nav-btn {
    background: none;
    border: none;
    padding: 10px;
    cursor: pointer;
    color: #262626;
    flex: 1;
    display: flex;
    justify-content: center;
  }
  .nav-btn svg { width: 24px; height: 24px; }
  .nav-btn:active { opacity: 0.6; }

  /* Modal de criar post */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal.show { display: flex; }

  .modal-content {
    background: white;
    width: 100%;
    max-width: 400px;
    border-radius: 16px 16px 0 0;
    padding: 16px;
    animation: slideUp 0.25s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #efefef;
  }
  .modal-title { font-weight: 600; font-size: 16px; }
  .close-btn { background: none; border: none; font-size: 28px; cursor: pointer; line-height: 1; color: #262626; }

  .file-input {
    width: 100%;
    padding: 12px;
    border: 1px dashed #dbdbdb;
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 14px;
    cursor: pointer;
  }

  .preview {
    width: 100%;
    max-height: 320px;
    object-fit: contain;
    border-radius: 8px;
    margin-bottom: 12px;
    display: none;
    background: #fafafa;
  }

  .caption-input {
    width: 100%;
    padding: 12px;
    border: 1px solid #dbdbdb;
    border-radius: 8px;
    font-size: 14px;
    resize: none;
    height: 80px;
    font-family: inherit;
    margin-bottom: 12px;
  }
  .caption-input:focus { outline: none; border-color: #a8a8a8; }

  .btn-publish {
    width: 100%;
    background: #0095f6;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 15px;
  }
  .btn-publish:disabled { opacity: 0.5; cursor: not-allowed; }

  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: #8e8e8e;
    font-size: 14px;
  }

  /* Esconde elementos */
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div class="app">
    <!-- Barra superior -->
    <header class="topbar">
      <h1 class="logo">Gsocial</h1>
      <button id="authBtn" class="btn-auth">Entrar</button>
    </header>

    <main>
      <!-- Tela de login -->
      <div id="login-screen">
        <div>
          <h2 class="login-title">Gsocial</h2>
          <p class="login-subtitle">Compartilhe momentos simples</p>
        </div>
        <button id="googleLogin" class="btn-google">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="white"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="white"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="white"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="white"/></svg>
          Entrar com Google
        </button>
      </div>

      <!-- Feed de posts -->
      <div id="feed" class="hidden"></div>
    </main>

    <!-- Barra inferior com apenas 2 ícones -->
    <nav class="bottombar hidden" id="bottombar">
      <button class="nav-btn" id="homeBtn" title="Home">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </button>
      <button class="nav-btn" id="createBtn" title="Criar">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </nav>
  </div>

  <!-- Modal para criar post -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title">Nova publicação</span>
        <button class="close-btn" id="closeModal">&times;</button>
      </div>
      
      <input type="file" id="fileInput" class="file-input" accept="image/*">
      <img id="preview" class="preview" alt="Prévia">
      <textarea id="captionInput" class="caption-input" placeholder="Escreva uma legenda..."></textarea>
      <button id="publishBtn" class="btn-publish" disabled>Publicar</button>
    </div>
  </div>

<script type="module">
  // Importa Firebase via CDN ES modules
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

  // Configuração do Firebase
  const firebaseConfig = { 
    apiKey: "AIzaSyD7w1covFc9VSa1kmjyEw5iTuAxLu2Raf8", 
    authDomain: "g-app-social.firebaseapp.com", 
    projectId: "g-app-social", 
    storageBucket: "g-app-social.firebasestorage.app", 
    messagingSenderId: "526544172649", 
    appId: "1:526544172649:web:5ac6f0ab0c9f84f98854f8" 
  };

  // Inicializa Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);
  const provider = new GoogleAuthProvider();

  // Elementos da interface
  const authBtn = document.getElementById('authBtn');
  const googleLogin = document.getElementById('googleLogin');
  const loginScreen = document.getElementById('login-screen');
  const feed = document.getElementById('feed');
  const bottombar = document.getElementById('bottombar');
  const createBtn = document.getElementById('createBtn');
  const homeBtn = document.getElementById('homeBtn');
  const modal = document.getElementById('modal');
  const closeModal = document.getElementById('closeModal');
  const fileInput = document.getElementById('fileInput');
  const preview = document.getElementById('preview');
  const captionInput = document.getElementById('captionInput');
  const publishBtn = document.getElementById('publishBtn');

  let currentUser = null;
  let unsubscribeFeed = null;

  // Observa estado de autenticação
  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (user) {
      // Usuário logado - mostra feed
      loginScreen.classList.add('hidden');
      feed.classList.remove('hidden');
      bottombar.classList.remove('hidden');
      authBtn.textContent = 'Sair';
      authBtn.classList.add('out');
      carregarFeed();
    } else {
      // Usuário deslogado - mostra login
      loginScreen.classList.remove('hidden');
      feed.classList.add('hidden');
      bottombar.classList.add('hidden');
      authBtn.textContent = 'Entrar';
      authBtn.classList.remove('out');
      if (unsubscribeFeed) unsubscribeFeed();
    }
  });

  // Função de login com Google
  async function entrar() {
    try {
      await signInWithPopup(auth, provider);
    } catch (e) {
      alert('Erro ao entrar: ' + e.message);
    }
  }

  googleLogin.addEventListener('click', entrar);
  authBtn.addEventListener('click', () => {
    if (currentUser) {
      signOut(auth);
    } else {
      entrar();
    }
  });

  // Carrega feed em tempo real
  function carregarFeed() {
    const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
    
    if (unsubscribeFeed) unsubscribeFeed();
    
    unsubscribeFeed = onSnapshot(q, (snapshot) => {
      feed.innerHTML = '';
      
      if (snapshot.empty) {
        feed.innerHTML = '<div class="empty-state">Nenhuma publicação ainda.<br>Seja o primeiro a postar!</div>';
        return;
      }

      snapshot.forEach((docSnap) => {
        const post = docSnap.data();
        const postId = docSnap.id;
        
        // Cria card do post
        const article = document.createElement('article');
        article.className = 'post';
        article.innerHTML = `
          <div class="post-header">
            <img src="${post.userPhoto || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(post.username)}" class="post-avatar" alt="">
            <span class="post-username">${post.username}</span>
          </div>
          <img src="${post.imageURL}" class="post-image" loading="lazy" alt="">
          <div class="post-actions">
            <button class="like-btn" data-id="${postId}">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
              <span class="like-count">${post.likes || 0}</span>
            </button>
          </div>
          <div class="post-caption">
            <strong>${post.username}</strong>${post.caption ? ' ' + escapeHtml(post.caption) : ''}
          </div>
        `;
        
        feed.appendChild(article);
      });

      // Adiciona eventos de like
      document.querySelectorAll('.like-btn').forEach(btn => {
        btn.addEventListener('click', () => curtirPost(btn.dataset.id));
      });
    });
  }

  // Função para curtir post - incrementa likes
  async function curtirPost(postId) {
    if (!currentUser) return;
    try {
      const postRef = doc(db, 'posts', postId);
      await updateDoc(postRef, {
        likes: increment(1)
      });
    } catch (e) {
      console.error('Erro ao curtir:', e);
    }
  }

  // Abre modal de criar
  createBtn.addEventListener('click', () => {
    if (!currentUser) return;
    modal.classList.add('show');
  });

  // Fecha modal
  closeModal.addEventListener('click', fecharModal);
  modal.addEventListener('click', (e) => {
    if (e.target === modal) fecharModal();
  });

  function fecharModal() {
    modal.classList.remove('show');
    fileInput.value = '';
    preview.style.display = 'none';
    preview.src = '';
    captionInput.value = '';
    publishBtn.disabled = true;
  }

  // Preview da imagem
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
      publishBtn.disabled = false;
    } else {
      preview.style.display = 'none';
      publishBtn.disabled = true;
    }
  });

  // Publicar post
  publishBtn.addEventListener('click', async () => {
    const file = fileInput.files[0];
    const caption = captionInput.value.trim();
    
    if (!file || !currentUser) return;
    
    publishBtn.disabled = true;
    publishBtn.textContent = 'Publicando...';

    try {
      // Faz upload da imagem para Storage
      const filePath = `posts/${currentUser.uid}/${Date.now()}_${file.name}`;
      const storageRef = ref(storage, filePath);
      await uploadBytes(storageRef, file);
      const imageURL = await getDownloadURL(storageRef);

      // Salva dados no Firestore
      await addDoc(collection(db, 'posts'), {
        uid: currentUser.uid,
        username: currentUser.displayName || 'Usuário',
        userPhoto: currentUser.photoURL || '',
        imageURL: imageURL,
        caption: caption,
        likes: 0,
        createdAt: serverTimestamp()
      });

      fecharModal();
      // Scroll para o topo
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (e) {
      alert('Erro ao publicar: ' + e.message);
      publishBtn.disabled = false;
    } finally {
      publishBtn.textContent = 'Publicar';
    }
  });

  // Botão home - volta ao topo
  homeBtn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Função auxiliar para escapar HTML
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
</script>
</body>
</html>
