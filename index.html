<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      p.timestamp = message.timestamp;
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

<body class="min-h-screen bg-black text-zinc-100">

<div class="max-w-[620px] mx-auto min-h-screen flex flex-col">

  <!-- LOGIN -->
  <main id="loginScreen" class="flex-1 flex flex-col items-center justify-center px-6 text-center">

      <h2 class="text-2xl font-extrabold led-text">gsocial</h2>

      <ul class="text-left mt-6 space-y-2 text-xs text-zinc-500">

      </ul>
      <button id="loginBtn" class="mt-6 w-full h-12 rounded-xl bg-white text-black font-semibold hover:opacity-90 active:scale-[.98] transition flex items-center justify-center gap-2">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#EA4335" d="M12 5c1.6 0 3 .6 4.1 1.6l3-3C17.1 1.9 14.7 1 12 1 7.3 1 3.3 3.7 1.4 7.5l3.5 2.7C5.8 7.3 8.6 5 12 5z"/><path fill="#4285F4" d="M23 12.3c0-.8-.1-1.5-.2-2.2H12v4.3h6.2c-.3 1.4-1.1 2.6-2.2 3.4l3.5 2.7c2-1.9 3.2-4.7 3.2-8.2z"/><path fill="#FBBC05" d="M5 14.8A6.9 6.9 0 0 1 4.5 12c0-.9.2-1.8.5-2.6L1.4 6.7A11.9 11.9 0 0 0 1 12c0 1.9.5 3.7 1.4 5.3l3.6-2.5z"/><path fill="#34A853" d="M12 23c2.7 0 5-0.9 6.7-2.4l-3.5-2.7c-1 .7-2.2 1.1-3.2 1.1-3.4 0-6.2-2.3-7.2-5.3L1.4 17.3C3.3 21.1 7.3 23 12 23z"/></svg>
        Entrar com Google
      </button>
    </div>
    <p class="text-[11px] text-zinc-600 mt-6">Preto #000 • Roxo #a855f7</p>

  <!-- APP -->
  <main id="appScreen" class="hidden flex-1 flex flex-col">
    <!-- COMPOSER -->
    <section class="px-3 pt-3">
      <div class="card rounded-[24px] p-3 glow">
        <div class="flex gap-2.5">

          <div class="flex-1">
            <textarea id="text" rows="2" placeholder="O que tá rolando?" class="w-full bg-transparent outline-none resize-none text-[15px] placeholder-zinc-600"></textarea>
            
            <div id="previewWrap" class="hidden relative mt-2">
              <img id="preview" class="max-h-[240px] w-full object-cover rounded-xl border border-fuchsia-500/20">
              <button id="clearPic" class="absolute top-2 right-2 w-7 h-7 rounded-full bg-black/80 backdrop-blur flex items-center justify-center text-zinc-300 hover:text-white border border-white/10">×</button>
            </div>

            <!-- PROGRESSO LED -->
            <div id="statusWrap" class="hidden mt-2">
              <div class="flex items-center justify-between">
                <span id="status" class="text-[11px] text-fuchsia-300 tracking-wide">Otimizando...</span>
                <span id="sizeInfo" class="text-[10px] text-zinc-500"></span>
              </div>
              <div id="progressWrap" class="h-[3px] w-full bg-zinc-900 rounded-full overflow-hidden mt-1.5 border border-fuchsia-900/30">
                <div id="progress" class="h-full w-0 bg-gradient-to-r from-violet-600 via-fuchsia-500 to-[#a855f7] led transition-all duration-150"></div>
              </div>
            </div>

            <div class="flex items-center justify-between mt-2.5">
              <div class="flex items-center gap-3">
                <label class="cursor-pointer group">
                  <input id="file" type="file" accept="image/*" class="hidden">
                  <div class="w-9 h-9 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center group-hover:border-fuchsia-500/50 transition">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-zinc-400 group-hover:text-fuchsia-400"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.3-3.3a2 2 0 0 0-2.8 0L6 21"/></svg>
                  </div>
                </label>
                <span class="text-[11px] text-zinc-600 hidden sm:block">MAX 720px • WebP • &lt;300KB</span>
              </div>
              <button id="postBtn" class="h-9 px-5 rounded-xl bg-[#a855f7] text-black font-bold text-sm led disabled:opacity-40 disabled:cursor-not-allowed active:scale-[.97] transition">Postar</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- FEED -->
    <section id="feed" class="px-3 py-3 space-y-3 pb-24"></section>
  </main>
</div>

<script type="module">
/* --- FIREBASE --- */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, updateDoc, doc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7w1covFc9VSa1kmjyEw5iTuAxLu2Raf8",
  authDomain: "g-app-social.firebaseapp.com",
  projectId: "g-app-social",
  storageBucket: "g-app-social.firebasestorage.app",
  messagingSenderId: "526544172649",
  appId: "1:526544172649:web:5ac6f0ab0c9f84f98854f8"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
const provider = new GoogleAuthProvider();

/* --- ELEMENTOS --- */
const loginScreen = document.getElementById('loginScreen');
const appScreen = document.getElementById('appScreen');
const loginBtn = document.getElementById('loginBtn');
const logout = document.getElementById('logout');
const userBox = document.getElementById('userBox');
const userPic = document.getElementById('userPic');
const myPic = document.getElementById('myPic');
const fileInput = document.getElementById('file');
const previewWrap = document.getElementById('previewWrap');
const previewImg = document.getElementById('preview');
const clearPic = document.getElementById('clearPic');
const textInput = document.getElementById('text');
const postBtn = document.getElementById('postBtn');
const feed = document.getElementById('feed');
const statusWrap = document.getElementById('statusWrap');
const statusEl = document.getElementById('status');
const progressWrap = document.getElementById('progressWrap');
const progressBar = document.getElementById('progress');
const sizeInfo = document.getElementById('sizeInfo');

const pendingPreviews = new Map(); // postId -> blobURL local

/* --- AUTH --- */
loginBtn.onclick = () => signInWithPopup(auth, provider);
logout.onclick = () => signOut(auth);

onAuthStateChanged(auth, user => {
  if (user) {
    loginScreen.classList.add('hidden');
    appScreen.classList.remove('hidden');
    userBox.classList.remove('hidden'); userBox.classList.add('flex');
    userPic.src = user.photoURL; myPic.src = user.photoURL;
    loadFeed();
  } else {
    loginScreen.classList.remove('hidden');
    appScreen.classList.add('hidden');
    userBox.classList.add('hidden');
  }
});

/* --- PREVIEW INSTANTÂNEO --- */
fileInput.onchange = e => {
  const f = e.target.files[0];
  if (!f) return;
  previewImg.src = URL.createObjectURL(f); // mostra na hora, zero espera
  previewWrap.classList.remove('hidden');
};
clearPic.onclick = () => { fileInput.value=''; previewWrap.classList.add('hidden'); };

/* --- OTIMIZAÇÃO CRÍTICA 1: COMPRESSÃO LOCAL --- */
/*
  ANTES: foto 4032x3024 (4.2MB) → upload 8-15s no 4G, trava app
  DEPOIS: redimensiona para 720px + WebP q0.65 → ~120-220KB → upload <1s
  Ganho: 10-20x mais rápido, 95% menos dados
*/
async function compressImage(file) {
  const originalSize = file.size;
  const bitmap = await createImageBitmap(file);
  let w = bitmap.width, h = bitmap.height;
  const MAX = 720;
  if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }

  // Usa OffscreenCanvas se disponível (mais rápido, não trava UI)
  const canvas = ('OffscreenCanvas' in window) ? new OffscreenCanvas(w, h) : Object.assign(document.createElement('canvas'), {width:w,height:h});
  const ctx = canvas.getContext('2d', { alpha:false });
  ctx.drawImage(bitmap, 0, 0, w, h);

  let quality = 0.65;
  let type = 'image/webp';
  let blob = await (canvas.convertToBlob ? canvas.convertToBlob({type, quality}) : new Promise(r=>canvas.toBlob(r,type,quality)));
  
  // fallback Safari antigo
  if (!blob || blob.size < 100) {
    type = 'image/jpeg';
    blob = await (canvas.convertToBlob ? canvas.convertToBlob({type, quality}) : new Promise(r=>canvas.toBlob(r,type,quality)));
  }
  // garante <300KB
  while (blob.size > 300 * 1024 && quality > 0.32) {
    quality -= 0.08;
    blob = await (canvas.convertToBlob ? canvas.convertToBlob({type, quality}) : new Promise(r=>canvas.toBlob(r,type,quality)));
  }
  sizeInfo.textContent = `${(originalSize/1024/1024).toFixed(1)}MB → ${(blob.size/1024).toFixed(0)}KB`;
  return blob;
}

/* --- POSTAR --- */
postBtn.onclick = async () => {
  const text = textInput.value.trim();
  const file = fileInput.files[0];
  if (!text && !file) return;

  postBtn.disabled = true;
  statusWrap.classList.remove('hidden');
  statusEl.textContent = file ? 'Otimizando...' : 'Publicando...';

  let compressed = null;
  let localUrl = null;

  if (file) {
    localUrl = URL.createObjectURL(file);
    // OTIMIZAÇÃO: comprime ANTES de subir
    compressed = await compressImage(file);
    statusEl.textContent = 'Enviando 0%';
    progressWrap.classList.remove('hidden');
    progressBar.style.width = '0%';
  }

  // OTIMIZAÇÃO 3: UI OTIMISTA - cria post imediatamente
  const postData = {
    text,
    authorId: auth.currentUser.uid,
    authorName: auth.currentUser.displayName,
    authorPhoto: auth.currentUser.photoURL,
    createdAt: serverTimestamp(),
    likes: [],
    imageUrl: null,
    uploading: !!file,
    error: false
  };
  const refDoc = await addDoc(collection(db, 'posts'), postData);
  if (localUrl) pendingPreviews.set(refDoc.id, localUrl);

  // limpa composer
  textInput.value = ''; fileInput.value = ''; previewWrap.classList.add('hidden');

  if (file && compressed) {
    // OTIMIZAÇÃO 2: uploadBytesResumable com progresso
    const path = `posts/${auth.currentUser.uid}/${refDoc.id}.webp`;
    const storageRef = ref(storage, path);
    const task = uploadBytesResumable(storageRef, compressed, { contentType: 'image/webp' });

    task.on('state_changed',
      snap => {
        const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
        statusEl.textContent = `Enviando ${pct}%`;
        progressBar.style.width = pct + '%';
      },
      err => {
        console.error(err);
        updateDoc(refDoc, { uploading:false, error:true });
        statusEl.textContent = 'Falha no upload';
        postBtn.disabled = false;
      },
      async () => {
        const url = await getDownloadURL(task.snapshot.ref);
        await updateDoc(refDoc, { imageUrl:url, uploading:false });
        pendingPreviews.delete(refDoc.id);
        statusWrap.classList.add('hidden');
        progressWrap.classList.add('hidden');
        postBtn.disabled = false;
        sizeInfo.textContent = '';
      }
    );
  } else {
    statusWrap.classList.add('hidden');
    postBtn.disabled = false;
  }
};

/* --- FEED --- */
function loadFeed() {
  const q = query(collection(db,'posts'), orderBy('createdAt','desc'));
  onSnapshot(q, snap => {
    feed.innerHTML = '';
    snap.forEach(d => {
      const p = d.data(); const id = d.id;
      const local = pendingPreviews.get(id);
      const imgSrc = p.uploading && local ? local : p.imageUrl;
      const liked = p.likes?.includes(auth.currentUser?.uid);
      
      const card = document.createElement('article');
      card.className = 'card rounded-[22px] overflow-hidden glow';
      card.innerHTML = `
        <div class="p-3 flex items-start gap-2.5">
          <img src="${p.authorPhoto||''}" class="w-8 h-8 rounded-full ring-1 ring-fuchsia-500/20">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="font-semibold text-[14px] truncate">${p.authorName||'Anônimo'}</span>
              ${p.uploading?'<span class="text-[10px] px-1.5 py-0.5 rounded bg-fuchsia-500/20 text-fuchsia-300 animate-pulse">enviando</span>':''}
              ${p.error?'<span class="text-[10px] px-1.5 py-0.5 rounded bg-red-500/20 text-red-300">erro</span>':''}
            </div>
            ${p.text?`<p class="text-[14px] leading-snug mt-1 whitespace-pre-wrap break-words">${escapeHtml(p.text)}</p>`:''}
          </div>
        </div>
        ${imgSrc?`<div class="relative bg-black border-t border-white/5">
          <img src="${imgSrc}" class="w-full max-h-[460px] object-contain bg-black" loading="lazy">
          ${p.uploading?`<div class="absolute inset-0 bg-black/60 backdrop-blur-[2px] flex items-center justify-center"><div class="w-8 h-8 rounded-full border-2 border-fuchsia-500/30 border-t-fuchsia-500 animate-spin"></div></div>`:''}
        </div>`:''}
        <div class="px-3 py-2.5 flex items-center gap-5 border-t border-white/5">
          <button data-like="${id}" class="group flex items-center gap-1.5">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="${liked?'#a855f7':'none'}" stroke="${liked?'#a855f7':'currentColor'}" stroke-width="1.8" class="text-zinc-500 group-hover:text-fuchsia-400 transition"><path d="M12 21c-1.5-1.3-4.5-3.8-6.5-5.8-2.5-2.5-3.5-4.5-3.5-6.7 0-2.5 2-4.5 4.5-4.5 1.5 0 3 .7 3.9 1.9.9-1.2 2.4-1.9 3.9-1.9 2.5 0 4.5 2 4.5 0 2.2-1 4.2-3.5 6.7-2 2-5 4.5-6.3 5.8"/></svg>
            <span class="text-[13px] text-zinc-400">${p.likes?.length||0}</span>
          </button>
        </div>
      `;
      feed.appendChild(card);
    });

    // likes
    feed.querySelectorAll('[data-like]').forEach(btn=>{
      btn.onclick = async () => {
        const id = btn.dataset.like;
        const refDoc = doc(db,'posts',id);
        const post = snap.docs.find(x=>x.id===id)?.data();
        const uid = auth.currentUser.uid;
        await updateDoc(refDoc, { likes: post.likes?.includes(uid) ? arrayRemove(uid) : arrayUnion(uid) });
      };
    });
  });
}

function escapeHtml(s){ return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) }
</script>
</body>
