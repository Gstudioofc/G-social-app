    <style>
        :root {
            --bg: #000000;
            --bg-secondary: #121212;
            --border: #262626;
            --text: #fafafa;
            --text-secondary: #a8a8a8;
            --accent: #0095f6;
            --gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            background: #181818;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overscroll-behavior: none;
        }

        .app-container {
            max-width: 420px;
            width: 100%;
            height: 100vh;
            margin: 0 auto;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        /* Top Bar */
        .top-bar {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-shrink: 0;
        }

        .logo {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .icon-btn:active { background: #222; }
        .icon-btn svg { width: 24px; height: 24px; }

        /* Tela de Login */
        .login-screen {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            z-index: 200;
            text-align: center;
        }

        .login-screen.hidden { display: none; }

        .login-card {
            width: 100%;
            max-width: 320px;
        }

        .login-logo {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 12px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-subtitle {
            color: var(--text-secondary);
            margin-bottom: 48px;
            font-size: 16px;
        }

        .btn-login {
            width: 100%;
            background: var(--text);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn-login:active { transform: scale(0.98); opacity: 0.9; }
        .btn-login svg { width: 20px; height: 20px; }

        /* Main App */
        #app-main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
        }
        #app-main::-webkit-scrollbar { display: none; }

        /* Stories */
        .stories {
            display: flex;
            gap: 14px;
            padding: 16px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
            scrollbar-width: none;
        }
        .stories::-webkit-scrollbar { display: none; }

        .story {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .story-ring {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            padding: 2.5px;
            background: var(--gradient);
        }

        .story-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2.5px solid var(--bg);
            background: var(--bg-secondary);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .story-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .story-username {
            font-size: 12px;
            color: var(--text-secondary);
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Feed */
        .feed {
            padding-bottom: 70px;
        }

        .post {
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            margin-bottom: 4px;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
        }

        .post-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg-secondary);
        }

        .post-username {
            font-weight: 600;
            font-size: 14px;
            flex: 1;
        }

        .post-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .post-image {
            width: 100%;
            aspect-ratio: 1/1;
            background: var(--bg-secondary);
            display: block;
            object-fit: cover;
        }

        .post-actions {
            padding: 12px 16px 8px;
            display: flex;
            gap: 16px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            transition: transform 0.15s;
        }
        .action-btn:active { transform: scale(0.9); }
        .action-btn svg { width: 26px; height: 26px; }
        .action-btn.liked svg { fill: #ed4956; stroke: #ed4956; color: #ed4956; }

        .post-likes {
            padding: 0 16px 4px;
            font-weight: 600;
            font-size: 14px;
        }

        .post-caption {
            padding: 0 16px 16px;
            font-size: 14px;
            line-height: 1.4;
        }
        .post-caption strong { font-weight: 600; margin-right: 6px; }

        /* Bottom Nav */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 58px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 90;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 12px;
            transition: color 0.2s;
        }
        .nav-btn.active { color: var(--text); }
        .nav-btn svg { width: 26px; height: 26px; }

        .nav-btn-create {
            background: var(--text);
            color: #000;
            border-radius: 14px;
            width: 44px;
            height: 34px;
        }

        /* Profile View */
        .profile-view {
            padding: 32px 20px 100px;
            text-align: center;
        }

        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            margin: 0 auto 16px;
            border: 3px solid var(--border);
            object-fit: cover;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .profile-email {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 28px;
        }

        .btn-logout {
            background: #262626;
            color: var(--text);
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-logout:active { background: #333; }

        /* Modal Criar */
        .modal {
            position: absolute;
            inset: 0;
            background: var(--bg);
            z-index: 300;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .modal.open { transform: translateY(0); }

        .modal-header {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .modal-header h3 { font-size: 16px; font-weight: 600; }
        .modal-header button {
            background: none;
            border: none;
            color: var(--text);
            font-size: 15px;
            cursor: pointer;
            padding: 6px 0;
        }
        .modal-header button.primary { color: var(--accent); font-weight: 600; }
        .modal-header button:disabled { opacity: 0.4; }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .upload-area {
            width: 100%;
            aspect-ratio: 1/1;
            background: var(--bg-secondary);
            border: 2px dashed var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }

        .upload-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0;
        }

        .upload-placeholder {
            text-align: center;
            color: var(--text-secondary);
        }
        .upload-placeholder svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.6; }

        #caption {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 15px;
            resize: none;
            min-height: 100px;
        }
        #caption::placeholder { color: var(--text-secondary); }
        #caption:focus { outline: none; border-color: #444; }

        .hidden { display: none !important; }

        .empty-feed {
            text-align: center;
            padding: 80px 40px;
            color: var(--text-secondary);
        }
        .empty-feed svg { width: 64px; height: 64px; opacity: 0.3; margin-bottom: 16px; }
    </style>
</head>

            </button>
            <button id="btn-create" class="nav-btn nav-btn-create" title="Criar">
                <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                </svg>
            </button>
            <button class="nav-btn" data-view="profile" title="Perfil">
                <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
                </svg>
            </button>
        </nav>

        <!-- Modal Criar Post -->
        <div id="modal-create" class="modal">
            <div class="modal-header">
                <button id="btn-close-modal">Cancelar</button>
                <h3>Nova publicação</h3>
                <button id="btn-publish" class="primary" disabled>Publicar</button>
            </div>
            <div class="modal-body">
                <label class="upload-area" for="input-file">
                    <input type="file" id="input-file" accept="image/*" capture="environment" hidden>
                    <img id="preview" class="hidden" alt="Preview">
                    <div id="upload-placeholder" class="upload-placeholder">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 16.5v2.25A2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
                        </svg>
                        <div>Toque para adicionar foto</div>
                    </div>
                </label>
                <textarea id="caption" placeholder="Escreva uma legenda..." maxlength="2200"></textarea>
            </div>
        </div>
    </div>

    <script type="module">
        // IMPORTAÇÕES DO FIREBASE via CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyD7w1covFc9VSa1kmjyEw5iTuAxLu2Raf8",
            authDomain: "g-app-social.firebaseapp.com",
            projectId: "g-app-social",
            storageBucket: "g-app-social.firebasestorage.app",
            messagingSenderId: "526544172649",
            appId: "1:526544172649:web:5ac6f0ab0c9f84f98854f8",
            measurementId: "G-NRZ98ZXBWW"
        };

        // INICIALIZA FIREBASE
        const app = initializeApp(firebaseConfig);
        try { getAnalytics(app); } catch(e) {}
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        // ELEMENTOS DOM
        const loginScreen = document.getElementById('login-screen');
        const appMain = document.getElementById('app-main');
        const bottomNav = document.getElementById('bottom-nav');
        const btnLogin = document.getElementById('btn-login');
        const btnAuthTop = document.getElementById('btn-auth-top');
        const btnLogout = document.getElementById('btn-logout');
        const feed = document.getElementById('feed');
        const modal = document.getElementById('modal-create');
        const btnCreate = document.getElementById('btn-create');
        const btnCloseModal = document.getElementById('btn-close-modal');
        const btnPublish = document.getElementById('btn-publish');
        const inputFile = document.getElementById('input-file');
        const preview = document.getElementById('preview');
        const uploadPlaceholder = document.getElementById('upload-placeholder');
        const caption = document.getElementById('caption');
        const profilePic = document.getElementById('profile-pic');
        const profileName = document.getElementById('profile-name');
        const profileEmail = document.getElementById('profile-email');
        const myStoryAvatar = document.getElementById('my-story-avatar');

        let currentUser = null;
        let selectedFile = null;
        let unsubscribeFeed = null;

        // LOGIN COM GOOGLE
        btnLogin.onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (err) {
                alert('Erro ao entrar: ' + err.message);
            }
        };

        // LOGOUT
        const doLogout = () => signOut(auth);
        btnAuthTop.onclick = doLogout;
        btnLogout.onclick = doLogout;

        // OBSERVA ESTADO DE AUTENTICAÇÃO
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                // Usuário logado
                loginScreen.classList.add('hidden');
                appMain.classList.remove('hidden');
                bottomNav.classList.remove('hidden');
                btnAuthTop.style.display = 'flex';
                
                // Atualiza perfil
                profilePic.src = user.photoURL || '';
                profileName.textContent = user.displayName || 'Usuário';
                profileEmail.textContent = user.email || '';
                myStoryAvatar.src = user.photoURL || '';

                // Inicia feed em tempo real
                startFeed();
            } else {
                // Usuário deslogado
                loginScreen.classList.remove('hidden');
                appMain.classList.add('hidden');
                bottomNav.classList.add('hidden');
                btnAuthTop.style.display = 'none';
                
                if (unsubscribeFeed) {
                    unsubscribeFeed();
                    unsubscribeFeed = null;
                }
                feed.innerHTML = '';
            }
        });

        // INICIA FEED EM TEMPO REAL
        function startFeed() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            
            unsubscribeFeed = onSnapshot(q, (snapshot) => {
                if (snapshot.empty) {
                    feed.innerHTML = `<div class="empty-feed">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        <p>Nenhuma publicação ainda.<br>Seja o primeiro a postar!</p>
                    </div>`;
                    return;
                }
                
                feed.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const post = docSnap.data();
                    const postEl = createPostElement(docSnap.id, post);
                    feed.appendChild(postEl);
                });
            });
        }

        // CRIA ELEMENTO DE POST
        function createPostElement(id, data) {
            const div = document.createElement('div');
            div.className = 'post';
            const time = data.createdAt?.toDate ? 
                new Date(data.createdAt.toDate()).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }) : 
                'agora';
            
            div.innerHTML = `
                <div class="post-header">
                    <img class="post-avatar" src="${data.userPhoto || ''}" alt="">
                    <span class="post-username">${data.username || 'usuário'}</span>
                    <span class="post-time">${time}</span>
                </div>
                <img class="post-image" src="${data.imageURL}" alt="Post" loading="lazy">
                <div class="post-actions">
                    <button class="action-btn btn-like" data-id="${id}">
                        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12s9-4.78 9-12z"/>
                        </svg>
                    </button>
                </div>
                <div class="post-likes">${data.likes || 0} curtidas</div>
                <div class="post-caption"><strong>${data.username || ''}</strong>${data.caption ? ' ' + escapeHtml(data.caption) : ''}</div>
            `;
            
            // Botão curtir
            const likeBtn = div.querySelector('.btn-like');
            likeBtn.onclick = async () => {
                try {
                    await updateDoc(doc(db, "posts", id), {
                        likes: increment(1)
                    });
                    likeBtn.classList.add('liked');
                    setTimeout(() => likeBtn.classList.remove('liked'), 300);
                } catch (e) {
                    console.error('Erro ao curtir:', e);
                }
            };
            
            return div;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // NAVEGAÇÃO BOTTOM
        document.querySelectorAll('.nav-btn[data-view]').forEach(btn => {
            btn.onclick = () => {
                const view = btn.dataset.view;
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                document.getElementById('view-home').classList.toggle('hidden', view !== 'home');
                document.getElementById('view-profile').classList.toggle('hidden', view !== 'profile');
            };
        });

        // ABRIR MODAL CRIAR
        btnCreate.onclick = () => {
            modal.classList.add('open');
            btnPublish.disabled = true;
        };

        btnCloseModal.onclick = closeModal;

        function closeModal() {
            modal.classList.remove('open');
            selectedFile = null;
            preview.src = '';
            preview.classList.add('hidden');
            uploadPlaceholder.classList.remove('hidden');
            caption.value = '';
            inputFile.value = '';
            btnPublish.disabled = true;
        }

        // SELECIONAR IMAGEM
        inputFile.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            selectedFile = file;
            preview.src = URL.createObjectURL(file);
            preview.classList.remove('hidden');
            uploadPlaceholder.classList.add('hidden');
            btnPublish.disabled = false;
        };

        // COMPRIMIR IMAGEM PARA WEBP
        async function compressImage(file, maxSize = 1080) {
            const bitmap = await createImageBitmap(file);
            let { width, height } = bitmap;
            
            if (width > height && width > maxSize) {
                height = Math.round(height * maxSize / width);
                width = maxSize;
            } else if (height > maxSize) {
                width = Math.round(width * maxSize / height);
                height = maxSize;
            }
            
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(bitmap, 0, 0, width, height);
            bitmap.close();
            
            return new Promise(resolve => {
                canvas.toBlob(blob => resolve(blob), 'image/webp', 0.8);
            });
        }

        // PUBLICAR POST
        btnPublish.onclick = async () => {
            if (!selectedFile || !currentUser) return;
            
            btnPublish.disabled = true;
            btnPublish.textContent = 'Publicando...';
            
            try {
                // Comprime imagem
                const compressed = await compressImage(selectedFile);
                
                // Upload para Storage
                const path = `posts/${currentUser.uid}/${Date.now()}.webp`;
                const storageRef = ref(storage, path);
                await uploadBytes(storageRef, compressed);
                const imageURL = await getDownloadURL(storageRef);
                
                // Salva no Firestore
                await addDoc(collection(db, "posts"), {
                    uid: currentUser.uid,
                    username: currentUser.displayName,
                    userPhoto: currentUser.photoURL,
                    imageURL,
                    caption: caption.value.trim(),
                    likes: 0,
                    createdAt: serverTimestamp()
                });
                
                closeModal();
                // Volta para home
                document.querySelector('[data-view="home"]').click();
                
            } catch (err) {
                console.error(err);
                alert('Erro ao publicar: ' + err.message);
            } finally {
                btnPublish.disabled = false;
                btnPublish.textContent = 'Publicar';
            }
        };

        // Fecha modal com ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('open')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
